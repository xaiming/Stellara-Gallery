# 后端服务端口与统一接口前缀。
server:
  port: 8123
  servlet:
    context-path: /api
spring:
  application:
    name: stellara-gallery-backend
  servlet:
    multipart:
      max-file-size: ${STELLARA_UPLOAD_MAX_FILE_SIZE:20MB}
      max-request-size: ${STELLARA_UPLOAD_MAX_REQUEST_SIZE:25MB}
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/stellara_gallery?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: xmz725
  data:
    redis:
      database: ${STELLARA_REDIS_DATABASE:1}
      host: ${STELLARA_REDIS_HOST:127.0.0.1}
      port: ${STELLARA_REDIS_PORT:6379}
      password: ${STELLARA_REDIS_PASSWORD:}
      timeout: ${STELLARA_REDIS_TIMEOUT:5000ms}
# MyBatis-Plus 基础配置：Mapper XML 路径、下划线转驼峰、逻辑删除规则。
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
# Swagger / OpenAPI 文档访问路径。
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
# Sa-Token 登录态配置，当前使用 Cookie 模式配合前端 credentials: include。
sa-token:
  token-name: stellara_token
  timeout: 2592000
  active-timeout: 604800
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
  is-read-cookie: true
  is-read-header: true
  is-write-header: true
cos:
  client:
    host: ${TENCENT_COS_HOST:}
    secret-id: ${TENCENT_COS_SECRET_ID:}
    secret-key: ${TENCENT_COS_SECRET_KEY:}
    region: ${TENCENT_COS_REGION:}
    bucket: ${TENCENT_COS_BUCKET:}
    upload-prefix: ${TENCENT_COS_UPLOAD_PREFIX:stellara-gallery}
